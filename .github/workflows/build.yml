name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK, CMake and zlib
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
          "ndk;27.0.12077973" \
          "cmake;3.22.1" \
          "platforms;android-35" \
          "build-tools;35.0.0"
        sudo apt-get update -qq
        sudo apt-get install -y -qq zlib1g-dev
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
    
    - name: Create project directories
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Clone Genesis Plus GX
      run: |
        cd app/src/main/cpp
        rm -rf genesis-plus-gx
        
        echo "Клонирую Genesis Plus GX..."
        git clone --depth 1 https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        
        echo ""
        echo "=== Проверка файлов ==="
        echo ""
        echo "System files:"
        ls -la genesis-plus-gx/core/system.c genesis-plus-gx/core/loadrom.c genesis-plus-gx/core/membnk.c 2>/dev/null || echo "Некоторые system файлы отсутствуют"
        
        echo ""
        echo "M68K files:"
        ls -la genesis-plus-gx/core/m68k/m68kcpu.c genesis-plus-gx/core/m68k/m68kops.c 2>/dev/null || echo "Некоторые M68K файлы отсутствуют"
        
        echo ""
        echo "VDP files:"
        ls -la genesis-plus-gx/core/vdp_render.c genesis-plus-gx/core/vdp_ctrl.c genesis-plus-gx/core/render.c 2>/dev/null || echo "Некоторые VDP файлы отсутствуют"
        
        echo ""
        echo "Sound files:"
        ls -la genesis-plus-gx/core/sound/ym2612.c genesis-plus-gx/core/sound/sn76489.c genesis-plus-gx/core/sound/sound.c 2>/dev/null || echo "Некоторые sound файлы отсутствуют"
        
        echo ""
        echo "=== Всего .c файлов: ==="
        find genesis-plus-gx/core -name "*.c" -type f | wc -l
        
        echo ""
        echo "=== Всего .h файлов: ==="
        find genesis-plus-gx/core -name "*.h" -type f | wc -l
        
        echo ""
        echo "=== Ключевые заголовки: ==="
        ls -la genesis-plus-gx/core/osd.h 2>/dev/null || echo "osd.h отсутствует"
        ls -la genesis-plus-gx/core/shared.h 2>/dev/null || echo "shared.h отсутствует"
        ls -la genesis-plus-gx/core/libretro.h 2>/dev/null || echo "libretro.h отсутствует"
    
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.11.1 --no-daemon
        chmod +x gradlew
        echo "Gradle wrapper создан"
        ls -la gradlew gradle/wrapper/
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        echo ""
        echo "=== Результат сборки ==="
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "APK собран успешно!"
          ls -la app/build/outputs/apk/debug/app-debug.apk
        else
          echo "APK не найден"
          find app/build -name "*.apk" -type f || echo "Файлов APK нет"
        fi
    
    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          build.log
          app/build/reports/
        retention-days: 7
