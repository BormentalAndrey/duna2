name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install NDK
      run: |
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Download Genesis Plus GX Core
      run: |
        cd app/src/main/cpp
        git clone https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        cd genesis-plus-gx
        git checkout 7e0e1f3
    
    - name: Build with Gradle
      run: ./gradlew assembleRelease
    
    - name: Sign APK
      run: |
        if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
          echo "${{ secrets.KEYSTORE }}" | base64 -d > keystore.jks
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore keystore.jks \
            -storepass ${{ secrets.STORE_PASS }} \
            -keypass ${{ secrets.KEY_PASS }} \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            dune2emu
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator
        path: app/build/outputs/apk/release/app-release-unsigned.apk
