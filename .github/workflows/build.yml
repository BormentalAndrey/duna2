name: Clone Genesis Plus GX and Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  clone-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Clone Genesis Plus GX
      run: |
        cd app/src/main/cpp
        rm -rf genesis-plus-gx
        git clone https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        
        # Копируем libretro заголовки в core
        cp genesis-plus-gx/libretro/osd.h genesis-plus-gx/core/osd.h
        cp genesis-plus-gx/libretro/libretro.h genesis-plus-gx/core/libretro.h
        
        # Удаляем .git
        rm -rf genesis-plus-gx/.git
    
    - name: Commit Genesis Plus GX
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add app/src/main/cpp/genesis-plus-gx
        git commit -m "Add Genesis Plus GX emulator core" || echo "Nothing to commit"
        git push

  build-apk:
    needs: clone-and-commit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK, CMake
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
          "ndk;27.0.12077973" \
          "cmake;3.22.1" \
          "platforms;android-35" \
          "build-tools;35.0.0"
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
    
    - name: Create directories
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Verify Genesis Plus GX
      run: |
        echo "Checking Genesis Plus GX..."
        if [ -f "app/src/main/cpp/genesis-plus-gx/core/system.c" ]; then
          echo "OK: Genesis Plus GX found"
        else
          echo "ERROR: Genesis Plus GX not found!"
          exit 1
        fi
        ls app/src/main/cpp/genesis-plus-gx/core/osd.h && echo "OK: osd.h found"
        ls app/src/main/cpp/genesis-plus-gx/core/libretro.h && echo "OK: libretro.h found"
    
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.11.1 --no-daemon
        chmod +x gradlew
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: ${{ runner.os }}-gradle-
    
    - name: Build APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace
        echo ""
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "APK BUILD SUCCESS!"
          ls -la app/build/outputs/apk/debug/app-debug.apk
        else
          echo "APK not found"
          find app/build -name "*.apk"
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
