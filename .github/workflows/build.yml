name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK, CMake
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
          "ndk;27.0.12077973" \
          "cmake;3.22.1" \
          "platforms;android-35" \
          "build-tools;35.0.0"
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
    
    - name: Create project directories
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Clone Genesis Plus GX with libretro headers
      run: |
        cd app/src/main/cpp
        rm -rf genesis-plus-gx
        
        # Клонируем полный репозиторий (не shallow) чтобы получить все файлы
        git clone https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        
        echo ""
        echo "=== Проверка наличия osd.h ==="
        find genesis-plus-gx -name "osd.h" -type f
        
        echo ""
        echo "=== Проверка наличия libretro.h ==="
        find genesis-plus-gx -name "libretro.h" -type f
        
        echo ""
        echo "=== Содержимое genesis-plus-gx/core/ ==="
        ls -la genesis-plus-gx/core/*.h 2>/dev/null || echo "Нет .h файлов в core/"
        
        echo ""
        echo "=== Содержимое genesis-plus-gx/libretro/ ==="
        ls -la genesis-plus-gx/libretro/ 2>/dev/null || echo "Нет папки libretro/"
        
        echo ""
        echo "=== Поиск osd.h во всем репозитории ==="
        find genesis-plus-gx -name "*.h" -type f | head -30
    
    - name: Copy libretro headers to core directory
      run: |
        cd app/src/main/cpp/genesis-plus-gx
        
        # Если osd.h есть в libretro/ папке, копируем в core/
        if [ -f "libretro/osd.h" ]; then
          cp libretro/osd.h core/osd.h
          echo "osd.h скопирован из libretro/ в core/"
        fi
        
        # Если libretro.h есть в libretro/ папке, копируем в core/
        if [ -f "libretro/libretro.h" ]; then
          cp libretro/libretro.h core/libretro.h
          echo "libretro.h скопирован из libretro/ в core/"
        fi
        
        # Проверяем все возможные места
        find . -name "osd.h" -type f -exec echo "Найден: {}" \;
        find . -name "libretro.h" -type f -exec echo "Найден: {}" \;
        
        echo ""
        echo "=== Финальная проверка core/osd.h ==="
        ls -la core/osd.h 2>/dev/null && echo "OK: osd.h на месте" || echo "osd.h все еще отсутствует"
        ls -la core/libretro.h 2>/dev/null && echo "OK: libretro.h на месте" || echo "libretro.h все еще отсутствует"
    
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.11.1 --no-daemon
        chmod +x gradlew
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build Debug APK
      run: |
        # Проверяем что osd.h и libretro.h на месте
        echo "=== Проверка заголовков перед сборкой ==="
        find app/src/main/cpp/genesis-plus-gx -name "osd.h" -type f
        find app/src/main/cpp/genesis-plus-gx -name "libretro.h" -type f
        
        # Запускаем сборку
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        
        echo ""
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "=== APK СОБРАН УСПЕШНО ==="
          ls -la app/build/outputs/apk/debug/app-debug.apk
        else
          echo "=== APK не найден ==="
          find app/build -name "*.apk" -type f 2>/dev/null
        fi
    
    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          build.log
          app/build/reports/
        retention-days: 7
