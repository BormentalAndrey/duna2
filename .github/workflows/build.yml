name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK and CMake
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
          "ndk;27.0.12077973" \
          "cmake;3.22.1" \
          "platforms;android-35" \
          "build-tools;35.0.0"
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
    
    - name: Create directories
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.11.1 --no-daemon
        chmod +x gradlew
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: ${{ runner.os }}-gradle-
    
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          app/build/reports/
        retention-days: 7
