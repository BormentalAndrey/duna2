name: Clone Genesis Plus GX and Commit

on:
  workflow_dispatch:

jobs:
  clone-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Clone Genesis Plus GX
      run: |
        cd app/src/main/cpp
        rm -rf genesis-plus-gx
        git clone https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        
        echo "=== Поиск заголовков ==="
        find genesis-plus-gx -name "osd.h" -type f
        find genesis-plus-gx -name "libretro.h" -type f
        
        echo "=== Копирование в core/ ==="
        
        OSD=$(find genesis-plus-gx -name "osd.h" -type f | head -1)
        if [ -n "$OSD" ]; then
          cp "$OSD" genesis-plus-gx/core/osd.h
          echo "osd.h copied from: $OSD"
        fi
        
        LIBRETRO=$(find genesis-plus-gx -name "libretro.h" -type f | head -1)
        if [ -n "$LIBRETRO" ]; then
          cp "$LIBRETRO" genesis-plus-gx/core/libretro.h
          echo "libretro.h copied from: $LIBRETRO"
        fi
        
        rm -rf genesis-plus-gx/.git
        rm -f genesis-plus-gx/.gitignore
        rm -f genesis-plus-gx/.gitmodules
        
        echo "=== Проверка ==="
        ls -la genesis-plus-gx/core/osd.h genesis-plus-gx/core/libretro.h genesis-plus-gx/core/shared.h
    
    - name: Commit and Push
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add app/src/main/cpp/genesis-plus-gx
        git commit -m "Add Genesis Plus GX emulator core" || echo "Nothing to commit"
        git push
