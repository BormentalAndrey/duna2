#!/bin/bash

echo "========================================="
echo "Полное клонирование Genesis Plus GX"
echo "========================================="

# Переходим в папку cpp
cd app/src/main/cpp

# Удаляем старую версию если есть
if [ -d "genesis-plus-gx" ]; then
    echo "Удаляю старую версию..."
    rm -rf genesis-plus-gx
fi

echo ""
echo "Клонирую полный репозиторий Genesis Plus GX..."
git clone https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx

echo ""
echo "Проверяю структуру..."

# Проверка наличия всех необходимых файлов
FILES_TO_CHECK=(
    "genesis-plus-gx/core/system.c"
    "genesis-plus-gx/core/loadrom.c"
    "genesis-plus-gx/core/membnk.c"
    "genesis-plus-gx/core/genesis.c"
    "genesis-plus-gx/core/md_ntsc.c"
    "genesis-plus-gx/core/md_pal.c"
    "genesis-plus-gx/core/m68k/m68kcpu.c"
    "genesis-plus-gx/core/m68k/m68kops.c"
    "genesis-plus-gx/core/z80/z80.c"
    "genesis-plus-gx/core/vdp_render.c"
    "genesis-plus-gx/core/vdp_ctrl.c"
    "genesis-plus-gx/core/render.c"
    "genesis-plus-gx/core/sound/ym2612.c"
    "genesis-plus-gx/core/sound/sn76489.c"
    "genesis-plus-gx/core/sound/sound.c"
    "genesis-plus-gx/core/sound/eq.c"
    "genesis-plus-gx/core/input_hw/input.c"
    "genesis-plus-gx/core/input_hw/gamepad.c"
    "genesis-plus-gx/core/io_ctrl.c"
    "genesis-plus-gx/core/io_joypad.c"
    "genesis-plus-gx/core/cart_hw/sram.c"
    "genesis-plus-gx/core/cart_hw/md_cart.c"
    "genesis-plus-gx/core/state.c"
    "genesis-plus-gx/core/sms.c"
    "genesis-plus-gx/core/shared.h"
    "genesis-plus-gx/core/osd.h"
    "genesis-plus-gx/core/libretro.h"
    "genesis-plus-gx/libretro/osd.h"
    "genesis-plus-gx/libretro/libretro.h"
)

ALL_OK=true
for file in "${FILES_TO_CHECK[@]}"; do
    if [ -f "$file" ]; then
        echo "  ✅ $file"
    else
        echo "  ❌ $file - ОТСУТСТВУЕТ"
        ALL_OK=false
    fi
done

echo ""
if [ "$ALL_OK" = true ]; then
    echo "✅ Все файлы на месте!"
else
    echo "⚠️  Некоторых файлов нет. Копирую из libretro/ в core/"
    
    # Копируем недостающие заголовки
    if [ -f "genesis-plus-gx/libretro/osd.h" ] && [ ! -f "genesis-plus-gx/core/osd.h" ]; then
        cp genesis-plus-gx/libretro/osd.h genesis-plus-gx/core/osd.h
        echo "  ✅ osd.h скопирован в core/"
    fi
    
    if [ -f "genesis-plus-gx/libretro/libretro.h" ] && [ ! -f "genesis-plus-gx/core/libretro.h" ]; then
        cp genesis-plus-gx/libretro/libretro.h genesis-plus-gx/core/libretro.h
        echo "  ✅ libretro.h скопирован в core/"
    fi
fi

# Удаляем .git из genesis-plus-gx чтобы закоммитить как свой код
echo ""
echo "Удаляю .git из genesis-plus-gx..."
rm -rf genesis-plus-gx/.git

echo ""
echo "========================================="
echo "Готово! Теперь выполните коммит:"
echo "========================================="
echo ""
echo "  cd ../../.."
echo "  git add app/src/main/cpp/genesis-plus-gx"
echo "  git commit -m 'Add Genesis Plus GX emulator core'"
echo "  git push"
echo ""
echo "Или запустите:"
echo "  ./commit_genesis.sh"
