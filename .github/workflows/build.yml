name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK, CMake and build tools
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
          "ndk;27.0.12077973" \
          "cmake;3.22.1" \
          "platforms;android-35" \
          "build-tools;35.0.0"
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
    
    - name: Create project directories
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Download Genesis Plus GX (libretro version)
      run: |
        cd app/src/main/cpp
        
        # Clone the libretro version which has all headers
        git clone --depth 1 --branch master \
          https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        
        echo "=== Проверка файлов ==="
        echo "system.c:"
        ls -la genesis-plus-gx/core/system.c 2>/dev/null || echo "NOT FOUND"
        echo "osd.h:"
        ls -la genesis-plus-gx/core/osd.h 2>/dev/null || echo "NOT FOUND"
        echo "libretro.h:"
        ls -la genesis-plus-gx/core/libretro.h 2>/dev/null || echo "NOT FOUND"
        
        echo "=== Все .h файлы ==="
        find genesis-plus-gx/core -name "*.h" | sort
        
        echo "=== Все .c файлы ==="
        find genesis-plus-gx/core -name "*.c" | sort | head -30
    
    - name: Setup Gradle Wrapper
      run: |
        # Generate Gradle wrapper
        gradle wrapper --gradle-version 8.11.1 --no-daemon
        chmod +x gradlew
        
        echo "=== Gradle wrapper files ==="
        ls -la gradlew gradle/wrapper/
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
