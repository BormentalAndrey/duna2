name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK and CMake
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" "platforms;android-35" "build-tools;35.0.0"
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
        echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1" >> local.properties
    
    - name: Create project structure
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Download Genesis Plus GX Core
      run: |
        cd app/src/main/cpp
        if [ ! -d "genesis-plus-gx" ]; then
          git clone --depth 1 https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        fi
    
    - name: Setup Gradle Wrapper
      run: |
        # Проверяем наличие gradlew
        if [ ! -f "gradlew" ]; then
          # Создаем gradlew с помощью системного gradle
          gradle wrapper --gradle-version 8.11.1 --no-daemon
        fi
        # Устанавливаем права на выполнение
        chmod +x gradlew
        # Проверяем
        ls -la gradlew
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports/
          app/build/outputs/logs/
          build/reports/
