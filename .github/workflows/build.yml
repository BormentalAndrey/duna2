name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
    
    - name: Install NDK and CMake
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" "platforms;android-35" "build-tools;35.0.0"
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> local.properties
    
    - name: Create project structure
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        touch app/src/main/assets/.gitkeep
    
    - name: Download Genesis Plus GX Core
      run: |
        cd app/src/main/cpp
        if [ ! -d "genesis-plus-gx" ]; then
          git clone --depth 1 https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx
        fi
    
    - name: Download Gradle Wrapper
      run: |
        # Удаляем старые поврежденные файлы если есть
        rm -f gradlew gradlew.bat
        rm -rf gradle/wrapper
        
        # Скачиваем официальный Gradle wrapper
        mkdir -p gradle/wrapper
        
        # Скачиваем gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        
        # Скачиваем gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
        
        # Скачиваем gradlew скрипт
        wget -q https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradlew -O gradlew
        
        # Делаем исполняемым
        chmod +x gradlew
        
        # Проверяем
        echo "Gradle wrapper files:"
        ls -la gradlew gradle/wrapper/
        file gradlew
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports/
          build/reports/
