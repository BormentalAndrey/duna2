#!/bin/bash

# Цвета для вывода
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
BLUE='\033[0;34m'
NC='\033[0m' # No Color

echo -e "${BLUE}============================================${NC}"
echo -e "${BLUE}   Genesis Plus GX - Клонирование и коммит  ${NC}"
echo -e "${BLUE}============================================${NC}"
echo ""

# Проверяем что мы в корне проекта
if [ ! -f "settings.gradle" ]; then
    echo -e "${RED}ОШИБКА: Запустите скрипт из корня проекта dune2-emulator/${NC}"
    exit 1
fi

# Проверяем наличие git
if ! command -v git &> /dev/null; then
    echo -e "${RED}ОШИБКА: git не установлен${NC}"
    exit 1
fi

# Создаем директорию если нужно
mkdir -p app/src/main/cpp

# Переходим в директорию cpp
cd app/src/main/cpp

# Удаляем старую версию если есть
if [ -d "genesis-plus-gx" ]; then
    echo -e "${YELLOW}Удаляю старую версию Genesis Plus GX...${NC}"
    rm -rf genesis-plus-gx
    echo -e "${GREEN}✅ Старая версия удалена${NC}"
fi

# Клонируем репозиторий
echo ""
echo -e "${YELLOW}Клонирую Genesis Plus GX из GitHub...${NC}"
echo "  https://github.com/libretro/Genesis-Plus-GX.git"
echo ""

if git clone https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx; then
    echo -e "${GREEN}✅ Репозиторий успешно склонирован${NC}"
else
    echo -e "${RED}❌ Ошибка клонирования!${NC}"
    echo "Проверьте интернет-соединение и попробуйте снова."
    exit 1
fi

# Размер склонированного репозитория
SIZE=$(du -sh genesis-plus-gx | cut -f1)
echo "  Размер: $SIZE"

# Проверяем структуру
echo ""
echo -e "${YELLOW}Проверяю структуру файлов...${NC}"

MISSING_FILES=0

check_file() {
    local file=$1
    if [ -f "genesis-plus-gx/$file" ]; then
        echo -e "  ${GREEN}✅${NC} $file"
        return 0
    else
        echo -e "  ${RED}❌${NC} $file - ОТСУТСТВУЕТ"
        MISSING_FILES=$((MISSING_FILES + 1))
        return 1
    fi
}

echo "  Основные файлы:"
check_file "core/system.c"
check_file "core/loadrom.c"
check_file "core/membnk.c"
check_file "core/genesis.c"
check_file "core/md_ntsc.c"
check_file "core/md_pal.c"

echo "  Процессоры:"
check_file "core/m68k/m68kcpu.c"
check_file "core/m68k/m68kops.c"
check_file "core/z80/z80.c"

echo "  Видео:"
check_file "core/vdp_render.c"
check_file "core/vdp_ctrl.c"
check_file "core/render.c"

echo "  Звук:"
check_file "core/sound/ym2612.c"
check_file "core/sound/sn76489.c"
check_file "core/sound/sound.c"
check_file "core/sound/eq.c"

echo "  Ввод:"
check_file "core/input_hw/input.c"
check_file "core/input_hw/gamepad.c"
check_file "core/io_ctrl.c"
check_file "core/io_joypad.c"

echo "  Картриджи/Сохранения:"
check_file "core/cart_hw/sram.c"
check_file "core/cart_hw/md_cart.c"

echo "  Состояния:"
check_file "core/state.c"
check_file "core/sms.c"

echo "  Заголовки:"
check_file "core/shared.h"

# Проверяем osd.h и libretro.h
OSD_IN_CORE=false
OSD_IN_LIBRETRO=false
LIBRETRO_IN_CORE=false
LIBRETRO_IN_LIBRETRO=false

if [ -f "genesis-plus-gx/core/osd.h" ]; then
    echo -e "  ${GREEN}✅${NC} core/osd.h"
    OSD_IN_CORE=true
else
    echo -e "  ${YELLOW}⚠️${NC}  core/osd.h - отсутствует в core/"
    if [ -f "genesis-plus-gx/libretro/osd.h" ]; then
        echo -e "  ${GREEN}✅${NC} libretro/osd.h - найден в libretro/"
        OSD_IN_LIBRETRO=true
    fi
fi

if [ -f "genesis-plus-gx/core/libretro.h" ]; then
    echo -e "  ${GREEN}✅${NC} core/libretro.h"
    LIBRETRO_IN_CORE=true
else
    echo -e "  ${YELLOW}⚠️${NC}  core/libretro.h - отсутствует в core/"
    if [ -f "genesis-plus-gx/libretro/libretro.h" ]; then
        echo -e "  ${GREEN}✅${NC} libretro/libretro.h - найден в libretro/"
        LIBRETRO_IN_LIBRETRO=true
    fi
fi

# Копируем недостающие заголовки из libretro/ в core/
echo ""
echo -e "${YELLOW}Копирую libretro заголовки в core/...${NC}"

if [ "$OSD_IN_CORE" = false ] && [ "$OSD_IN_LIBRETRO" = true ]; then
    cp genesis-plus-gx/libretro/osd.h genesis-plus-gx/core/osd.h
    echo -e "${GREEN}✅ osd.h скопирован в core/${NC}"
    MISSING_FILES=$((MISSING_FILES - 1))
fi

if [ "$LIBRETRO_IN_CORE" = false ] && [ "$LIBRETRO_IN_LIBRETRO" = true ]; then
    cp genesis-plus-gx/libretro/libretro.h genesis-plus-gx/core/libretro.h
    echo -e "${GREEN}✅ libretro.h скопирован в core/${NC}"
    MISSING_FILES=$((MISSING_FILES - 1))
fi

# Удаляем .git из склонированного репозитория
echo ""
echo -e "${YELLOW}Удаляю .git из genesis-plus-gx...${NC}"
rm -rf genesis-plus-gx/.git
rm -f genesis-plus-gx/.gitignore genesis-plus-gx/.gitmodules 2>/dev/null
echo -e "${GREEN}✅ Готово${NC}"

# Возвращаемся в корень проекта
cd ../../..

echo ""
echo -e "${BLUE}============================================${NC}"
echo -e "${BLUE}          Результаты проверки               ${NC}"
echo -e "${BLUE}============================================${NC}"
echo ""

if [ $MISSING_FILES -gt 0 ]; then
    echo -e "${RED}⚠️  Отсутствует $MISSING_FILES файл(ов)!${NC}"
    echo ""
    echo "Отсутствующие файлы не критичны для сборки,"
    echo "но могут потребоваться для полной функциональности."
    echo ""
else
    echo -e "${GREEN}✅ Все необходимые файлы на месте!${NC}"
    echo ""
fi

# Добавляем в git
echo -e "${YELLOW}Добавляю файлы в git...${NC}"
git add app/src/main/cpp/genesis-plus-gx

# Показываем статистику
ADDED_FILES=$(git diff --cached --name-only | wc -l)
echo -e "${GREEN}Добавлено файлов: $ADDED_FILES${NC}"
echo ""

# Делаем коммит
COMMIT_MESSAGE="Add Genesis Plus GX emulator core

- Full Genesis Plus GX core from libretro repository
- M68K and Z80 CPU emulation
- VDP video processor emulation
- YM2612 FM and SN76489 PSG sound emulation
- Cartridge, SRAM, and state save support
- Sega CD and SMS compatibility
- All libretro headers included"

echo -e "${YELLOW}Создаю коммит...${NC}"
echo ""

if git commit -m "$COMMIT_MESSAGE"; then
    echo ""
    echo -e "${GREEN}✅ Коммит создан успешно!${NC}"
    echo ""
    
    # Спрашиваем про push
    read -p "Отправить на GitHub? (y/n): " PUSH_ANSWER
    
    if [ "$PUSH_ANSWER" = "y" ] || [ "$PUSH_ANSWER" = "Y" ]; then
        echo ""
        echo -e "${YELLOW}Отправляю на GitHub...${NC}"
        
        if git push; then
            echo ""
            echo -e "${GREEN}✅ Успешно отправлено!${NC}"
        else
            echo ""
            echo -e "${RED}❌ Ошибка отправки!${NC}"
            echo "Попробуйте вручную: git push"
        fi
    else
        echo ""
        echo -e "${YELLOW}Пропускаю отправку.${NC}"
        echo "Не забудьте сделать push позже: git push"
    fi
else
    echo ""
    echo -e "${RED}❌ Ошибка при создании коммита!${NC}"
    echo "Возможно, нечего коммитить или есть конфликты."
    echo "Проверьте статус: git status"
    exit 1
fi

echo ""
echo -e "${BLUE}============================================${NC}"
echo -e "${BLUE}              Готово!                       ${NC}"
echo -e "${BLUE}============================================${NC}"
echo ""
echo -e "${GREEN}Genesis Plus GX теперь в вашем репозитории.${NC}"
echo ""
echo "Следующие шаги:"
echo "  1. Убедитесь что GitHub Actions workflow обновлен"
echo "  2. Запустите сборку через Actions или локально:"
echo "     ./gradlew assembleDebug"
echo ""
echo -e "${YELLOW}Важно: Не добавляйте ROM файлы в репозиторий!${NC}"
echo "  ROM файлы защищены авторским правом."
echo ""
