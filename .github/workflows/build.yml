name: Build Dune 2 Emulator APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Install NDK
      run: |
        yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
    
    - name: Create Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
    
    - name: Create project structure
      run: |
        # Создаем все необходимые директории
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p app/src/main/java/com/dune2emu
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        
        # Создаем файл .gitkeep
        touch app/src/main/assets/.gitkeep
    
    - name: Download Genesis Plus GX Core
      run: |
        cd app/src/main/cpp
        git clone --depth 1 https://github.com/libretro/Genesis-Plus-GX.git genesis-plus-gx || echo "Core already exists or download failed"
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> local.properties
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
      continue-on-error: true
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Dune2Emulator-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
    
    - name: Upload Release APK (if exists)
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: Dune2Emulator-Release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 7
